version: '3.8'

# Development Docker Compose
# Usage: docker-compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: stealthpay-postgres-dev
    environment:
      POSTGRES_USER: stealthpay
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: stealthpay
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./stealthpay/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stealthpay -d stealthpay"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stealthpay-redis-dev
    ports:
      - "6379:6379"
    command: redis-server --requirepass devpassword
    volumes:
      - redis_dev_data:/data

  api:
    build:
      context: .
      dockerfile: railway/Dockerfile.railway
    container_name: stealthpay-api-dev
    environment:
      DATABASE_URL: postgresql://stealthpay:devpassword@postgres:5432/stealthpay
      REDIS_URL: redis://:devpassword@redis:6379/0
      MONERO_RPC_HOST: ${MONERO_RPC_HOST:-host.docker.internal}
      MONERO_RPC_PORT: ${MONERO_RPC_PORT:-18082}
      MONERO_RPC_USER: ${MONERO_RPC_USER:-}
      MONERO_RPC_PASS: ${MONERO_RPC_PASS:-}
      ADMIN_API_KEY: dev-admin-key
      SECRET_KEY: dev-secret-key
      LOG_LEVEL: DEBUG
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn stealthpay.api.main_v2:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_dev_data:
  redis_dev_data:
