global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # MPC Nodes
  - job_name: 'mpc-nodes'
    static_configs:
      - targets:
        - 'mpc-node-1:8001'
        - 'mpc-node-2:8001'
        - 'mpc-node-3:8001'
        - 'mpc-node-4:8001'
        - 'mpc-node-5:8001'
    metrics_path: /metrics
    scrape_interval: 10s

  # API Server
  - job_name: 'api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics
    scrape_interval: 10s

  # Bitcoin Node
  - job_name: 'bitcoin'
    static_configs:
      - targets: ['bitcoin:18443']
    metrics_path: /metrics

  # Monero Node (if exporter available)
  - job_name: 'monero'
    static_configs:
      - targets: ['monero:38081']
    metrics_path: /metrics
