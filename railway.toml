# Sthrip Railway Configuration
# This file configures automatic deployment to Railway

[build]
builder = "DOCKERFILE"
dockerfilePath = "railway/Dockerfile.railway"

[deploy]
startCommand = "sh -c 'gunicorn api.main_v2:app --worker-class uvicorn.workers.UvicornWorker --workers ${WEB_CONCURRENCY:-1} --bind 0.0.0.0:${PORT:-8000} --graceful-timeout 60 --timeout 120'"
healthcheckPath = "/ready"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production]
numReplicas = 1

[environments.staging]
numReplicas = 1
