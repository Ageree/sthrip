# Sthrip Railway Configuration
# This file configures automatic deployment to Railway

[build]
builder = "DOCKERFILE"
dockerfilePath = "railway/Dockerfile.railway"

[deploy]
startCommand = "sh -c 'uvicorn api.main_v2:app --host 0.0.0.0 --port ${PORT:-8000} --timeout-graceful-shutdown 30'"
healthcheckPath = "/ready"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production]
numReplicas = 1

[environments.staging]
numReplicas = 1
