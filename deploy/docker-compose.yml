version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sthrip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sthrip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sthrip}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sthrip} -d ${POSTGRES_DB:-sthrip}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sthrip-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: sthrip-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sthrip-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Sthrip API
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: sthrip-api
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-sthrip}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sthrip}
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      
      # Monero Wallet RPC (external or containerized)
      MONERO_RPC_HOST: ${MONERO_RPC_HOST}
      MONERO_RPC_PORT: ${MONERO_RPC_PORT:-18082}
      MONERO_RPC_USER: ${MONERO_RPC_USER}
      MONERO_RPC_PASS: ${MONERO_RPC_PASS}
      
      # API Settings
      PORT: 8000
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sthrip-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Webhook Worker
  webhook-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: sthrip-webhook-worker
    restart: unless-stopped
    command: python -c "import asyncio; from sthrip.services.webhook_service import get_webhook_service; asyncio.run(get_webhook_service().start_worker())"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sthrip}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sthrip}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - sthrip-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: sthrip-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - sthrip-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Monero Wallet RPC (if self-hosted)
  # monero-wallet-rpc:
  #   image: ghcr.io/sethforprivacy/simple-monero-wallet-rpc:latest
  #   container_name: sthrip-monero
  #   restart: unless-stopped
  #   environment:
  #     WALLET_FILE: /wallets/sthrip
  #     WALLET_PASSWORD: ${MONERO_WALLET_PASSWORD}
  #     RPC_BIND_PORT: 18082
  #     RPC_BIND_IP: 0.0.0.0
  #     CONFIRM_EXTERNAL_BIND: 1
  #     RPC_LOGIN: ${MONERO_RPC_USER}:${MONERO_RPC_PASS}
  #   volumes:
  #     - monero_wallets:/wallets
  #   ports:
  #     - "127.0.0.1:18082:18082"
  #   networks:
  #     - sthrip-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local
  # monero_wallets:
  #   driver: local

networks:
  sthrip-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
