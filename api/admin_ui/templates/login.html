<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — Sthrip Admin</title>
    <link rel="stylesheet" href="/admin/static/tailwind.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-sm">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Sthrip Admin</h1>
        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-2 rounded mb-4 text-sm">
            {{ error }}
        </div>
        {% endif %}
        <form method="post" action="/admin/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <label class="block text-sm font-medium text-gray-700 mb-1" for="admin_key">Admin Key</label>
            <input type="password" name="admin_key" id="admin_key"
                   class="w-full border border-gray-300 rounded px-3 py-2 mb-4 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                   required autocomplete="current-password"/>
            <button type="submit"
                    class="w-full bg-indigo-600 text-white py-2 rounded font-medium hover:bg-indigo-700 transition">
                Login
            </button>
        </form>
    </div>
</body>
</html>
